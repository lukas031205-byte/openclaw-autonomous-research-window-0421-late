<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Gaussian Splatting — Interactive Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; color: #e0e0ff; font-family: monospace; overflow: hidden; }
  canvas { display: block; cursor: crosshair; }
  #ui {
    position: fixed; top: 12px; left: 12px;
    background: rgba(10,10,30,0.85);
    border: 1px solid #334;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12px;
    line-height: 1.8;
    min-width: 220px;
    backdrop-filter: blur(4px);
  }
  #ui h2 { color: #88aaff; font-size: 13px; margin-bottom: 6px; }
  #ui .label { color: #8899bb; }
  #ui .val { color: #ccddff; }
  button {
    margin-top: 8px; margin-right: 4px;
    background: #1a1a3a; border: 1px solid #446;
    color: #aabbff; border-radius: 4px;
    padding: 3px 10px; cursor: pointer; font-size: 11px;
  }
  button:hover { background: #2a2a5a; }
  #eq {
    position: fixed; bottom: 12px; left: 12px;
    background: rgba(10,10,30,0.85);
    border: 1px solid #334;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 11px;
    color: #7799cc;
    max-width: 340px;
    line-height: 1.7;
    backdrop-filter: blur(4px);
  }
  #eq .title { color: #88aaff; font-size: 12px; margin-bottom: 4px; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <h2>🔵 3D Gaussian Splatting</h2>
  <div><span class="label">Gaussians: </span><span class="val" id="count">0</span></div>
  <div><span class="label">Alpha blending: </span><span class="val">front-to-back</span></div>
  <div><span class="label">Click:</span> <span class="val">add Gaussian</span></div>
  <div><span class="label">Scroll:</span> <span class="val">change opacity</span></div>
  <br>
  <button id="btnAdd">+ Random</button>
  <button id="btnClear">Clear</button>
  <button id="btnSort">Re-sort depth</button>
</div>

<div id="eq">
  <div class="title">arXiv:2308.04079 — Core Rendering Equation</div>
  C = Σᵢ cᵢ · αᵢ · Πⱼ＜ᵢ (1 − αⱼ)<br>
  αᵢ = oᵢ · exp(−½ Δxᵀ Σ⁻¹ Δx)<br>
  Σ′ = J W Σ Wᵀ Jᵀ  (3D→2D projection)
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); draw(); });

// ---- Gaussian state ----
let gaussians = [];
let globalOpacity = 0.72;

function randGaussian(x, y) {
  const hue = Math.random() * 360;
  return {
    x: x ?? Math.random() * canvas.width,
    y: y ?? Math.random() * canvas.height,
    // 2D covariance: rotation + scale
    scaleX: 30 + Math.random() * 120,
    scaleY: 20 + Math.random() * 80,
    angle: Math.random() * Math.PI,
    // Color
    r: Math.floor(Math.random() * 200 + 55),
    g: Math.floor(Math.random() * 200 + 55),
    b: Math.floor(Math.random() * 200 + 55),
    opacity: 0.55 + Math.random() * 0.45,
    // Fake depth for sorting
    depth: Math.random(),
  };
}

// Seed with some initial Gaussians
for (let i = 0; i < 18; i++) gaussians.push(randGaussian());

// Sort by depth (back to front for painter's algorithm, front-to-back for proper alpha)
function sortByDepth() {
  gaussians.sort((a, b) => b.depth - a.depth); // back-to-front
}
sortByDepth();

// ---- Core rendering: alpha compositing ----
// C = Σ c_i * α_i * Π_{j<i}(1 - α_j)
// We approximate: draw back-to-front with per-Gaussian alpha (painter's algo)
// Each Gaussian is a radial basis exp(-0.5 * Δx^T Σ^{-1} Δx)

function drawGaussian(g) {
  ctx.save();
  ctx.translate(g.x, g.y);
  ctx.rotate(g.angle);

  // Radial gradient approximates the Gaussian kernel exp(-0.5 r²)
  const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.max(g.scaleX, g.scaleY));
  const a = g.opacity * globalOpacity;
  grad.addColorStop(0,   `rgba(${g.r},${g.g},${g.b},${a.toFixed(3)})`);
  grad.addColorStop(0.4, `rgba(${g.r},${g.g},${g.b},${(a*0.6).toFixed(3)})`);
  grad.addColorStop(1,   `rgba(${g.r},${g.g},${g.b},0)`);

  ctx.scale(g.scaleX / Math.max(g.scaleX, g.scaleY), g.scaleY / Math.max(g.scaleX, g.scaleY));
  ctx.beginPath();
  ctx.arc(0, 0, Math.max(g.scaleX, g.scaleY), 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw grid (fake 3D depth cue)
  ctx.save();
  ctx.strokeStyle = 'rgba(40,60,100,0.18)';
  ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width; x += 60) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 60) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
  ctx.restore();

  // Composite: back → front
  for (const g of gaussians) {
    drawGaussian(g);
  }

  document.getElementById('count').textContent = gaussians.length;
}

// Animation: gently animate scale for visual interest
let t = 0;
function animate() {
  t += 0.008;
  for (let i = 0; i < gaussians.length; i++) {
    const g = gaussians[i];
    g.x += Math.sin(t * 0.7 + i * 1.3) * 0.3;
    g.y += Math.cos(t * 0.5 + i * 0.9) * 0.2;
    // Keep in bounds
    g.x = Math.max(0, Math.min(canvas.width, g.x));
    g.y = Math.max(0, Math.min(canvas.height, g.y));
  }
  draw();
  requestAnimationFrame(animate);
}
animate();

// ---- Interactions ----
canvas.addEventListener('click', e => {
  const g = randGaussian(e.clientX, e.clientY);
  gaussians.push(g);
  sortByDepth();
});

canvas.addEventListener('wheel', e => {
  globalOpacity = Math.max(0.05, Math.min(1.0, globalOpacity - e.deltaY * 0.001));
});

document.getElementById('btnAdd').addEventListener('click', () => {
  for (let i = 0; i < 5; i++) gaussians.push(randGaussian());
  sortByDepth();
});

document.getElementById('btnClear').addEventListener('click', () => {
  gaussians = [];
});

document.getElementById('btnSort').addEventListener('click', () => {
  // Re-randomize depths and re-sort for visual effect
  gaussians.forEach(g => g.depth = Math.random());
  sortByDepth();
});
</script>
</body>
</html>
